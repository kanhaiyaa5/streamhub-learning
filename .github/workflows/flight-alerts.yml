name: Flight Price Alerts

on:
  schedule:
    # Every 6 hours at minute 0 UTC → 00, 06, 12, 18 UTC.
    # 06:00 UTC run sends the daily summary (configured in flight_alerts.py).
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write          # required to commit updated state.json back

concurrency:
  group: flight-alerts
  cancel-in-progress: false

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight price check
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python flight_alerts.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "flight-alerts-bot"
            git config user.email "flight-alerts-bot@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update state.json [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi